# docker-compose.yml - SentinelBox 快速啟動
#
# 使用：
#   docker compose build
#   docker compose run --rm sandbox -- /bin/sh -c "echo hello"
#   docker compose run --rm sandbox -- /bin/sh -c "nc -w1 example.com 80"  # 驗證 strict 阻擋網路

services:
  sandbox:
    build: .
    image: sentinelbox:latest
    privileged: true
    cgroup: private
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    volumes:
      - ./sentinelbox.db:/var/lib/sentinelbox/audit.db
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      SENTINELBOX_PROFILE: strict
      SENTINELBOX_LOG: info

  audit:
    image: sentinelbox:latest
    profiles: ["tools"]
    volumes:
      - ./sentinelbox.db:/var/lib/sentinelbox/audit.db
    entrypoint:
      - sqlite3
      - -box
      - /var/lib/sentinelbox/audit.db
      - "SELECT * FROM executions ORDER BY start_ts DESC LIMIT 20;"

